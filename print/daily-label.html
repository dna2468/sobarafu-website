<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>当日消費期限ラベル（UN-331 40面）｜焼きそばスタンド らふ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=RocknRoll+One&family=Zen+Maru+Gothic:wght@700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --c-red: #C1272D;
    --c-brown: #42210B;
    --f-display: "RocknRoll One", sans-serif;
    --f-heading: "Zen Maru Gothic", sans-serif;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: #d0cfc9;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
    font-family: var(--f-heading);
  }
  .hint {
    max-width: 210mm;
    margin: 16px auto;
    padding: 12px 16px;
    background: #fff;
    border-left: 4px solid var(--c-red);
    font-size: 12px;
    line-height: 1.6;
    color: #333;
    border-radius: 4px;
  }
  .hint strong { color: var(--c-red); }

  .sheet {
    width: 210mm;
    height: 297mm;
    margin: 20px auto;
    background: #fff;
    display: grid;
    grid-template-columns: repeat(4, 52.5mm);
    grid-template-rows: repeat(10, 29.7mm);
    gap: 0;
  }
  .label {
    width: 52.5mm;
    height: 29.7mm;
    padding: 2mm 2.5mm 2.5mm;
    display: flex;
    align-items: stretch;
    gap: 2mm;
    overflow: hidden;
  }
  .label-logo {
    width: 11mm;
    height: 11mm;
    align-self: center;
    flex-shrink: 0;
    margin-left: 2mm;
    transform: translateY(-3mm);
  }
  .label-logo img {
    width: 100%;
    height: 100%;
    display: block;
    object-fit: contain;
  }
  .label-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    gap: 2mm;
    min-width: 0;
    margin-left: -1mm;
  }
  .label-msg {
    font-family: var(--f-heading);
    font-weight: 900;
    font-size: 8.2pt;
    color: var(--c-red);
    line-height: 1.2;
    letter-spacing: .02em;
    margin: 0 0 0 2mm;
    transform: translateY(-3mm);
  }
  .label-date {
    font-family: var(--f-heading);
    font-weight: 700;
    font-size: 10pt;
    color: var(--c-brown);
    letter-spacing: .1em;
    margin: 0;
    display: flex;
    align-items: baseline;
    gap: 1mm;
  }
  .date-slot {
    display: inline-block;
    width: 11mm;
    border-bottom: 0.7pt solid var(--c-brown);
    height: 1.4em;
  }

  /* Cut guides visible on screen only (not printed) */
  .label { outline: 0.25pt dashed rgba(0,0,0,.15); outline-offset: -0.25pt; }

  @media print {
    @page {
      size: A4 portrait;
      margin: 0;
    }
    html, body { background: #fff; }
    .sheet {
      margin: 0;
      box-shadow: none;
      page-break-after: avoid;
    }
    .hint { display: none !important; }
    .label { outline: none; }
  }
</style>
</head>
<body>

<div class="hint">
  <strong>印刷方法</strong>：ブラウザの「印刷」（Ctrl/Cmd + P）→ 用紙サイズ <strong>A4</strong>、余白 <strong>なし</strong>、倍率 <strong>100%</strong>、背景のグラフィック <strong>ON</strong>。
  <br>ラベル用紙は UNIPACK UN-331（A4 / 40面 / 52.5×29.7mm / 余白なし）に最適化しています。
  <br>印刷前にまず普通紙で試し刷りして、位置がズレていないかご確認を推奨します。
</div>

<div class="sheet" id="sheet"></div>

<template id="label-tpl">
  <div class="label">
    <span class="label-logo"><img src="../logo-brand/ra-mark.svg" alt=""></span>
    <div class="label-content">
      <p class="label-msg">本日中に<br>お召し上がりください</p>
      <p class="label-date"><span class="date-slot"></span>月<span class="date-slot"></span>日</p>
    </div>
  </div>
</template>

<script>
  // 40ラベルを生成
  const sheet = document.getElementById('sheet');
  const tpl = document.getElementById('label-tpl');
  for (let i = 0; i < 40; i++) {
    sheet.appendChild(tpl.content.cloneNode(true));
  }
</script>

</body>
</html>
