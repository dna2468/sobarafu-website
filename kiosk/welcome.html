<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>食券機 ようこそ画面｜焼きそばスタンド らふ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=RocknRoll+One&family=Zen+Kaku+Gothic+New:wght@400;500;700&family=Zen+Maru+Gothic:wght@500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --c-red: #C1272D;
    --c-red-deep: #9A1F24;
    --c-brown: #42210B;
    --c-orange: #FFB800;
    --c-cta: #FF6B35;
    --c-cream: #FFFDF5;
    --c-butter: #FFF8E7;
    --f-display: "RocknRoll One", sans-serif;
    --f-heading: "Zen Maru Gothic", sans-serif;
    --f-body: "Zen Kaku Gothic New", sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 1080px;
    height: 1920px;
    background: var(--c-cream);
    font-family: var(--f-body);
    color: var(--c-brown);
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  .screen {
    width: 1080px;
    height: 1920px;
    position: relative;
    overflow: hidden;
    background:
      radial-gradient(circle at 12% 8%, rgba(255, 184, 0, .25) 0%, transparent 45%),
      radial-gradient(circle at 88% 92%, rgba(255, 107, 53, .22) 0%, transparent 50%),
      var(--c-cream);
    display: grid;
    grid-template-rows: auto 1fr auto;
    padding: 70px 60px 160px;
    row-gap: 30px;
  }

  /* Background pattern */
  .screen::before {
    content: "";
    position: absolute;
    inset: 0;
    background-image: url("../logo-brand/ra-mark.svg");
    background-size: 220px;
    background-repeat: space;
    opacity: 0.05;
    pointer-events: none;
    z-index: 0;
  }
  .screen > * { position: relative; z-index: 1; }

  /* ===== TOP: HERO PHOTO ===== */
  .hero {
    text-align: center;
  }
  .hero-photo {
    width: 880px;
    height: 660px;
    margin: 0 auto;
    border-radius: 36px;
    overflow: hidden;
    border: 14px solid #fff;
    box-shadow: 0 24px 60px rgba(66, 33, 11, .25), 0 0 0 4px rgba(193, 39, 45, .12);
    transform: rotate(-1.2deg);
    background: var(--c-butter);
  }
  .hero-photo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .hero-catch {
    margin-top: 36px;
    font-family: var(--f-display);
    font-size: 64px;
    color: var(--c-red);
    line-height: 1.25;
    letter-spacing: .08em;
  }
  .hero-catch em {
    font-style: normal;
    background: linear-gradient(transparent 60%, rgba(255, 184, 0, .55) 60%);
    padding: 0 10px;
  }

  /* ===== MIDDLE: TOUCH CTA ===== */
  .touch-wrap {
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .touch-area {
    background: linear-gradient(135deg, var(--c-red) 0%, var(--c-red-deep) 100%);
    color: #fff;
    border-radius: 44px;
    padding: 36px 70px 42px;
    text-align: center;
    box-shadow: 0 22px 0 rgba(154, 31, 36, .55), 0 8px 32px rgba(193, 39, 45, .35);
    position: relative;
    width: 100%;
  }
  .touch-area::before {
    content: "";
    position: absolute;
    top: -14px; left: -14px; right: -14px; bottom: -14px;
    border: 4px dashed var(--c-orange);
    border-radius: 56px;
    opacity: .55;
    animation: breathe 2.4s ease-in-out infinite;
  }
  @keyframes breathe {
    0%, 100% { transform: scale(1); opacity: .55; }
    50% { transform: scale(1.02); opacity: .85; }
  }
  .touch-jp {
    font-family: var(--f-heading);
    font-weight: 900;
    font-size: 70px;
    line-height: 1.35;
    letter-spacing: .04em;
    margin: 0;
  }
  .touch-jp strong {
    color: var(--c-orange);
    background: rgba(255, 255, 255, .14);
    padding: 0 18px;
    border-radius: 14px;
  }
  .touch-en {
    font-family: var(--f-display);
    font-size: 28px;
    color: var(--c-orange);
    margin-top: 18px;
    letter-spacing: .25em;
    opacity: .9;
  }

  /* ===== BOTTOM: STORE NAME (centered) ===== */
  .brand-bottom {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
  }
  .brand-bottom img { display: block; height: auto; }
  .brand-bottom-stand { width: 400px; }
  .brand-bottom-rafu {
    width: 480px;
    margin-top: -4px;
    filter: drop-shadow(8px 8px 0 var(--c-brown));
  }

  /* ===== Decorative dots ===== */
  .deco {
    position: absolute;
    border-radius: 50%;
    z-index: 0;
  }
  .deco-1 { top: 60px; right: 80px; width: 50px; height: 50px; background: var(--c-red); opacity: .45; }
  .deco-2 { top: 130px; right: 160px; width: 30px; height: 30px; background: var(--c-orange); opacity: .7; }
  .deco-3 { top: 50px; left: 80px; width: 38px; height: 38px; background: var(--c-orange); opacity: .55; }
  .deco-4 { bottom: 60px; left: 80px; width: 28px; height: 28px; background: var(--c-red); opacity: .4; }
  .deco-5 { bottom: 110px; right: 90px; width: 44px; height: 44px; background: var(--c-orange); opacity: .55; }
</style>
</head>
<body>

<div class="screen">
  <span class="deco deco-1"></span>
  <span class="deco deco-2"></span>
  <span class="deco deco-3"></span>
  <span class="deco deco-4"></span>
  <span class="deco deco-5"></span>

  <!-- ===== TOP: HERO PHOTO ===== -->
  <div class="hero">
    <div class="hero-photo">
      <img src="../menu-photos/ソース焼きそば_目玉焼きトッピング_.jpg" alt="ソース焼きそば 目玉焼きトッピング">
    </div>
    <p class="hero-catch"><em>いらっしゃいませ。</em></p>
  </div>

  <!-- ===== MIDDLE: TOUCH CTA ===== -->
  <div class="touch-wrap">
    <div class="touch-area">
      <p class="touch-jp">画面に<strong>タッチ</strong>して<br>ご注文を始めてください</p>
      <p class="touch-en">TOUCH TO START</p>
    </div>
  </div>

  <!-- ===== BOTTOM: STORE NAME (centered) ===== -->
  <div class="brand-bottom">
    <img class="brand-bottom-stand" src="../logo-brand/rafu-logo-stand.svg" alt="焼きそばスタンド">
    <img class="brand-bottom-rafu" src="../logo-brand/rafu-logo-rafu.svg" alt="らふ">
  </div>
</div>

</body>
</html>
